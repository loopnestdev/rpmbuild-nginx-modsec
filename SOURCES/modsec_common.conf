SecRule FILES_TMPNAMES "@inspectFile /usr/local/bin/clamav_scan.sh" "phase:2,id:2002,t:none,log,deny,msg:'Virus found in uploaded file'"
SecRule REQUEST_BASENAME ".\.(pdf|xls|xlsx|xlts|xlt|xltm|xlam|doc|docx|docm|dotx|dot|dotm|ppt|pptx|pot|potx|pps|pptm|potm|ppsm)\.$" "id:2003,phase:2,log,deny,t:lowercase,t:normalizePath,msg:'Selected file extension is forbidden'"
SecRule REQUEST_URI ".*\.(pdf|xls|xlsx|xlts|xlt|xltm|xlam|doc|docx|docm|dotx|dot|dotm|ppt|pptx|pot|potx|pps|pptm|potm|ppsm)\.*$" "phase:1,id:2004,log,deny,t:lowercase,t:normalizePath,msg:'Selected file extension is forbidden'"
SecRule REQUEST_URI "^/hello$" "phase:1,id:2005,nolog,pass,ctl:ruleEngine=off"
