resolver 127.0.0.1;

large_client_header_buffers 8 32k;
proxy_buffers               8 256k;
proxy_buffer_size           128k;
proxy_busy_buffers_size     256k;

client_max_body_size        0;

# Keepalive from client
#keepalive_requests          500;
#keepalive_timeout           75s;

# Keepalive to upstreams
proxy_http_version          1.1;
proxy_redirect              off;
#proxy_set_header            Connection "";
proxy_cache_path            /var/cache/nginx levels=1:2 keys_zone=appcache:10m max_size=10g inactive=60m use_temp_path=off;

log_format  apm     '$time_local '
                    '$remote_addr '
                    '$remote_user '
                    '$request '
                    '$request_length '
                    '$status '
                    '$bytes_sent '
                    '$body_bytes_sent '
                    '$http_referer '
                    '$host '
                    '$server_port '
                    '$http_user_agent '
                    '$http_x_forwarded_for '
                    '$http_front_end_https '
                    '$upstream_addr '
                    '$upstream_status '
                    '$request_time '
                    '$upstream_response_time '
                    '$upstream_connect_time '
                    '$upstream_header_time '
                    '$ssl_protocol '
                    '$ssl_cipher';

log_format      apm_json escape=json '{'
                        '"level":"info",'
                        '"ts":"$time_iso8601",'
                        '"request": {'
                                '"remote_user":"$remote_user",'
                                '"client_ip":"$http_x_forwarded_for",'
                                '"remote_ip": "$remote_addr",'
                                '"method": "$request_method",'
                                '"protocol": "$server_protocol",'
                                '"host": "$host",'
                                '"uri": "$request_uri",'
                                '"headers": {'
                                        '"user_agent":"$http_user_agent",'
                                        '"accept": "$http_accept",'
                                        '"accept-encoding": "$http_accept_encoding",'
                                        '"x-request-id": "$request_id"'
                                '},'
                                '"request_length":"$request_length",'
                                '"request_body":"$request_body",'
                                '"request_time":"$request_time"'
                        '},'
                        '"response": {'
                                '"response_length":"$bytes_sent",'
                                '"response_body":"$body_bytes_sent"'
                        '},'
                        '"tls": {'
                                '"version":"$ssl_protocol",'
                                '"cipher":"$ssl_cipher"'

                        '},'
                        '"status": "$status",'
                        '"http_referer":"$http_referer",'
                        '"upstream_addr":"$upstream_addr",'
                        '"upstream_status":"$upstream_status",'
                        '"upstream_connect_time":"$upstream_connect_time",'
                        '"upstream_response_time":"$upstream_response_time"'
                '}';

log_format      compressed_apm_json escape=json '{'
                        '"lvl":"info",'
                        '"ts":"$time_iso8601",'
                        '"req": {'
                                '"rusr":"$remote_user",'
                                '"cip":"$http_x_forwarded_for",'
                                '"rip": "$remote_addr",'
                                '"mthd": "$request_method",'
                                '"proto": "$server_protocol",'
                                '"host": "$host",'
                                '"uri": "$request_uri",'
                                '"hdrs": {'
                                        '"ua":"$http_user_agent",'
                                        '"acc": "$http_accept"'
                                '},'
                                '"reql":"$request_length",'
                                '"reqb":"$request_body",'
                                '"reqt":"$request_time"'
                        '},'
                        '"resp": {'
                                '"respl":"$bytes_sent",'
                                '"respb":"$body_bytes_sent"'
                        '},'
                        '"tls": {'
                                '"ver":"$ssl_protocol",'
                                '"cip":"$ssl_cipher"'

                        '},'
                        '"sts": "$status",'
                        '"hf":"$http_referer",'
                        '"uaddr":"$upstream_addr",'
                        '"usts":"$upstream_status",'
                        '"uct":"$upstream_connect_time",'
                        '"urt":"$upstream_response_time"'
                '}';

